<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="stylesheet" href="styles/style.css">
</head>

<!-- Login page -->
<body>

    <div id="loginPage" class="login-container">
        <img src="./Github-Issue-Tracker/assets/github-logo.png" class="logo" alt="github logo">
       <h1>GitHub Issues Tracker</h1>
       <p>Track and manage repository issues</p>

       <input id="username" type="text" placeholder="Username">
       <input id="password" type="password" placeholder="Password">
       <button onclick="login()">Sign In</button>
        <div class="demo">
        Demo credentials<br>
        Username: admin<br>
        Password: admin123
        </div>
        <p id="loginError"></p>
    </div>

    <!-- Main page -->
     <div id="mainPage" class="hidden">

    <!-- NAVBAR -->

    <nav class="navbar">

    <div class="logoSection">
    <img src="./Github-Issue-Tracker/assets/github-logo.png">
    <h2>GitHub Issue Tracker</h2>
    </div>

    <div class="searchBox">
    <input id="searchInput" placeholder="Search issues">
    <button onclick="searchIssues()">Search</button>
    </div>

    </nav>
    
</body>
</html>
