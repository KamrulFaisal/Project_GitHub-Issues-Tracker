<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Issues Tracker</title>
<link rel="stylesheet" href="styles/style.css">
</head>

<body>

<!-- LOGIN PAGE -->

<div id="loginPage">

<form id="loginForm" class="login-container">

<img src="assets/github-logo.png" class="logo">

<h1>GitHub Issues Tracker</h1>
<p>Track and manage repository issues</p>

<input id="username" type="text" placeholder="Username" required>
<input id="password" type="password" placeholder="Password" required>

<button type="submit" class="loginBtn">Sign In</button>

<div class="divider">
<span>OR</span>
</div>

<div class="demo">
Demo credentials:<br><br>

<b>Username:</b> admin<br>
<b>Password:</b> admin123
</div>

<p id="loginError"></p>

</form>

</div>



<!-- MAIN PAGE -->

<div id="mainPage" class="hidden">

<nav class="navbar">

<div class="logoSection">
<img src="assets/github-logo.png">
<h2>GitHub Issue Tracker</h2>
</div>

<div class="searchBox">
<input id="searchInput" placeholder="Search issues">
<button id="searchBtn">Search</button>
</div>

</nav>


<div class="issueHeader">

<div class="leftHeader">
<img src="assets/Aperture.png">
<span id="issueCount">0 Issues</span>
</div>

<div class="tabs">
<button class="tab active" data-type="all">All</button>
<button class="tab" data-type="open">Open</button>
<button class="tab" data-type="closed">Closed</button>
</div>

</div>


<div id="loader" class="loader hidden"></div>

<div id="issueContainer" class="grid"></div>

</div>



<!-- MODAL -->

<div id="modal" class="modal hidden">

<div class="modalContent">

<span id="closeModal" class="close">×</span>

<h2 id="modalTitle"></h2>
<p id="modalDesc"></p>

<p><b>Status:</b> <span id="modalStatus"></span></p>
<p><b>Author:</b> <span id="modalAuthor"></span></p>
<p><b>Priority:</b> <span id="modalPriority"></span></p>
<p><b>Label:</b> <span id="modalLabel"></span></p>
<p><b>Created:</b> <span id="modalCreated"></span></p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
