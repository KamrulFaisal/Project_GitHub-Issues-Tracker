<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GitHub Issues Tracker</title>

<link rel="stylesheet" href="styles/style.css">

<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>


<!-- LOGIN PAGE -->

<div id="loginPage">

<form id="loginForm" class="login-container">

<img src="assets/github-logo.png" class="logo">

<h1>GitHub Issues Tracker</h1>
<p>Sign in to manage your issues</p>

<label class="inputLabel">Username</label>
<input id="username" required>

<p class="defaultText">Default: admin</p>

<label class="inputLabel">Password</label>
<input id="password" type="password" required>

<p class="defaultText">Default: admin123</p>

<button class="loginBtn">Sign In</button>

<div class="divider">
<span>OR</span>
</div>

<div class="demo">

Demo credentials <br><br>

<b>Username:</b> admin <br>
<b>Password:</b> admin123

</div>

<p id="loginError"></p>

</form>

</div>



<!-- MAIN PAGE -->

<div id="mainPage" class="hidden">


<nav class="navbar">

<div class="navInner">

<div class="logoSection">

<img src="assets/github-logo.png">

<h2>GitHub Issue Tracker</h2>

</div>

<div class="navRight">

<input id="searchInput" placeholder="Search issues">

<button id="newIssueBtn">+ New Issue</button>

</div>

</div>

</nav>



<div class="pageWrapper">


<div class="tabs">

<button class="tab active" data-type="all">All</button>
<button class="tab" data-type="open">Open</button>
<button class="tab" data-type="closed">Closed</button>

</div>



<div class="issueHeader">

<div class="issueLeft">

<img src="assets/Aperture.png">

<div>

<h3 id="issueCount">0 Issues</h3>

<p class="subtitle">

Track and manage your project issues

</p>

</div>

</div>


<div class="issueLegend">

<span class="dot openDot"></span> Open

<span class="dot closedDot"></span> Closed

</div>

</div>



<div id="issueContainer" class="grid"></div>

</div>

</div>



<!-- MODAL -->

<div id="modal" class="modal">

<div class="modalContent">

<span id="closeModal" class="close">×</span>

<h2 id="modalTitle"></h2>

<p id="modalDesc"></p>

<p><b>Status:</b> <span id="modalStatus"></span></p>
<p><b>Author:</b> <span id="modalAuthor"></span></p>
<p><b>Priority:</b> <span id="modalPriority"></span></p>
<p><b>Label:</b> <span id="modalLabel"></span></p>
<p><b>Created:</b> <span id="modalCreated"></span></p>

</div>

</div>


<script src="script.js"></script>

</body>
</html>
